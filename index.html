<!DOCTYPE html>
<html>
<head>
  <title>vvraizth AI</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1e1f29, #2c2f3a);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 65%;
      animation: fadeIn 0.3s ease;
    }

    .user {
      background: linear-gradient(135deg, #0b93f6, #007aff);
      align-self: flex-end;
    }

    .bot {
      background: #444654;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
      background: #2c2f3a;
      color: white;
    }

    input:focus {
      box-shadow: 0 0 8px #19c37d;
    }

    button {
      margin-left: 10px;
      padding: 12px 20px;
      background: linear-gradient(135deg, #19c37d, #00ffcc);
      border: none;
      border-radius: 8px;
      color: black;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .loading {
      font-style: italic;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Talk to your AI..." />
    <button onclick="send()">Send</button>
  </div>

  <script>
    function addMessage(text, className) {
      const chat = document.getElementById("chat");
      const msg = document.createElement("div");
      msg.className = "msg " + className;
      msg.innerText = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    async function send() {
      const input = document.getElementById("input");
      const message = input.value;

      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      const loadingMsg = addMessage("Thinking...", "bot loading");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      loadingMsg.innerText = data.reply;
      loadingMsg.classList.remove("loading");
    }
  </script>

</body>
</html>
