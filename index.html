<!DOCTYPE html>
<html>
<head>
  <title>VVR AI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #app {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .row {
      display: flex;
      align-items: flex-end;
      margin: 8px 0;
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      margin: 0 8px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 70%;
      font-size: 14px;
      animation: pop 0.25s ease;
    }

    .user {
      background: #4facfe;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: white;
      color: #333;
    }

    #inputArea {
      display: flex;
      flex-direction: column;
      padding: 10px;
      background: rgba(255,255,255,0.7);
      position: sticky;
      bottom: 0;
    }

    #username {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 15px;
      border: none;
      outline: none;
    }

    .inputRow {
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-left: 8px;
      padding: 8px 15px;
      background: #ff6b81;
      border: none;
      border-radius: 20px;
      color: white;
      cursor: pointer;
    }

    @keyframes pop {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    @media (min-width: 600px) {
      #app {
        height: 90vh;
        border-radius: 20px;
        overflow: hidden;
      }
    }
  </style>
</head>

<body>

<div id="app">
  <div id="chat"></div>

  <div id="inputArea">
    <input id="username" placeholder="Enter your name..." />

    <div class="inputRow">
      <input id="input" placeholder="Talk to VVR..." />
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
  let history = [];

  function createMessage(text, type) {
    const row = document.createElement("div");
    row.className = "row";

    const avatar = document.createElement("img");
    avatar.className = "avatar";

    const msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;

    if (type === "bot") {
      avatar.src = "https://api.dicebear.com/7.x/bottts/svg?seed=VVR";
      row.appendChild(avatar);
      row.appendChild(msg);
    } else {
      const username = document.getElementById("username").value || "guest";
      avatar.src = "https://api.dicebear.com/7.x/adventurer/svg?seed=" + username;

      row.appendChild(msg);
      row.appendChild(avatar);
      row.style.justifyContent = "flex-end";
    }

    document.getElementById("chat").appendChild(row);
    row.scrollIntoView();
    return msg;
  }

  function typeEffect(el, text) {
    let i = 0;
    el.innerText = "";
    const timer = setInterval(() => {
      el.innerText += text[i];
      i++;
      if (i >= text.length) clearInterval(timer);
    }, 20);
  }

  async function send() {
    const input = document.getElementById("input");
    const message = input.value;
    if (!message) return;

    createMessage(message, "user");
    input.value = "";

    history.push({ role: "user", content: message });

    const botMsg = createMessage("Thinking...", "bot");

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message, history })
      });

      const data = await res.json();

      history.push({ role: "assistant", content: data.reply });

      typeEffect(botMsg, data.reply);

    } catch (err) {
      botMsg.innerText = "Error...";
    }
  }

  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") send();
  });
</script>

</body>
</html>
