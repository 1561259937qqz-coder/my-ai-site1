<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
    }

    .page { display: none; height: 100vh; flex-direction: column; }
    .active { display: flex; }
    .center { justify-content: center; align-items: center; }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: 80%;
      max-width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f9f9f9;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background: #ff4757; }

    #chat-content, #posts-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user-msg { background: #4facfe; color: white; margin-left: auto; }
    .bot-msg { background: white; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    .post-card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .comment-item {
      font-size: 0.9em;
      background: #f1f1f1;
      padding: 5px 10px;
      margin: 5px 0;
      border-radius: 5px;
    }

    #nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px 0;
      border-top: 1px solid #eee;
    }

    .input-area { display: flex; padding: 10px; background: white; border-top: 1px solid #eee; }
    .input-area input { flex: 1; margin-right: 10px; }
  </style>
</head>

<body>

<div id="loginPage" class="page active center">
  <div class="card">
    <h2>Login</h2>
    <input id="login-user" placeholder="用户名 (vvr / xiaola)">
    <input id="login-pass" type="password" placeholder="密码">
    <button onclick="handleLogin()">Enter</button>
  </div>
</div>

<div id="mainPage" class="page">

  <div id="chatSection" class="page active" style="height: calc(100vh - 60px);">
    <div id="chat-content"></div>
    <div class="input-area">
      <input id="chatInput" placeholder="给 VVR 发消息...">
      <button onclick="handleSend()">发送</button>
      <button onclick="startVoice()">🎤</button>
    </div>
  </div>

  <div id="postSection" class="page" style="height: calc(100vh - 60px);">
    <div id="posts-list"></div>
    <div class="input-area">
      <input id="postInput" placeholder="分享点什么...">
      <button onclick="handleAddPost()">发布</button>
    </div>
  </div>

  <div id="nav">
    <button onclick="switchTo('chatSection')">聊天</button>
    <button onclick="switchTo('postSection')">社区</button>
    <button onclick="handleLogout()">退出</button>
  </div>

</div>

<script>
// --- 配置区 ---
const SUPABASE_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co"; // 保持不变
const SUPABASE_KEY = "你的ANON_KEY"; // 替换为你的 Publishable key

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const allowedUsers = [
  { username: "xiaola", password: "060530" },
  { username: "vvr", password: "031210" }
];

let currentUser = null;
let chatHistory = [];
let globalPosts = [];

// --- 登录逻辑 ---
function handleLogin() {
  const uInput = document.getElementById("login-user").value;
  const pInput = document.getElementById("login-pass").value;

  const user = allowedUsers.find(u => u.username === uInput && u.password === pInput);
  
  if (!user) {
    alert("账号或密码错误！");
    return;
  }

  currentUser = user;
  localStorage.setItem("vvr_user", JSON.stringify(user));
  showMainInterface();
}

function showMainInterface() {
  document.getElementById("loginPage").classList.remove("active");
  document.getElementById("mainPage").classList.add("active");
  loadSupabasePosts();
}

function handleLogout() {
  localStorage.removeItem("vvr_user");
  location.reload();
}

function switchTo(sectionId) {
  document.getElementById("chatSection").classList.remove("active");
  document.getElementById("postSection").classList.remove("active");
  document.getElementById(sectionId).classList.add("active");
}

// --- 聊天功能 ---
function appendChatMsg(text, type) {
  const container = document.getElementById("chat-content");
  const div = document.createElement("div");
  div.className = "msg " + (type === 'user' ? "user-msg" : "bot-msg");
  div.innerText = text;
  container.appendChild(div);
  div.scrollIntoView();
}

async function handleSend() {
  const input = document.getElementById("chatInput");
  const msg = input.value.trim();
  if (!msg) return;

  appendChatMsg(msg, "user");
  input.value = "";

  // 注意：此 API 需你后端支持，否则会报错
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, history: chatHistory })
    });
    const data = await res.json();
    appendChatMsg(data.reply, "bot");
    speakResponse(data.reply);
  } catch (e) {
    appendChatMsg("AI 接口未连接 (请检查后端 API)", "bot");
  }
}

// --- 社区功能 (Supabase) ---
async function handleAddPost() {
  const input = document.getElementById("postInput");
  const text = input.value.trim();
  if (!text || !currentUser) return;

  const { error } = await supabase.from("posts").insert([
    { user: currentUser.username, text: text, comments: [] }
  ]);

  if (error) {
    console.error(error);
    alert("发布失败，请检查数据库权限");
  } else {
    input.value = "";
    loadSupabasePosts();
  }
}

async function loadSupabasePosts() {
  const { data, error } = await supabase
    .from("posts")
    .select("*")
    .order('created_at', { ascending: false });

  if (error) {
    console.error("加载失败:", error);
    return;
  }
  globalPosts = data || [];
  renderPostsList();
}

async function handleAddComment(index) {
  const input = document.getElementById(`comment-in-${index}`);
  const val = input.value.trim();
  if (!val) return;

  const post = globalPosts[index];
  const newComments = [...(post.comments || []), { user: currentUser.username, text: val }];

  const { error } = await supabase
    .from("posts")
    .update({ comments: newComments })
    .eq("id", post.id);

  if (error) alert("评论失败");
  else loadSupabasePosts();
}

function renderPostsList() {
  const container = document.getElementById("posts-list");
  container.innerHTML = "";

  globalPosts.forEach((p, i) => {
    let commentHtml = (p.comments || []).map(c => 
      `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`
    ).join("");

    const card = document.createElement("div");
    card.className = "post-card";
    card.innerHTML = `
      <div style="color:#ff6b81; font-weight:bold; margin-bottom:5px;">@${p.user}</div>
      <div style="margin-bottom:10px;">${p.text}</div>
      <div id="comments-area-${i}">${commentHtml}</div>
      <div style="margin-top:10px; display:flex;">
        <input id="comment-in-${i}" style="font-size:12px; padding:5px;" placeholder="写评论...">
        <button onclick="handleAddComment(${i})" style="padding:5px 10px; font-size:12px; margin-left:5px;">发送</button>
      </div>
    `;
    container.appendChild(card);
  });
}

// --- 语音辅助 ---
function startVoice() {
  const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
  if (!SpeechRecognition) return alert("当前浏览器不支持语音识别");
  
  const recognition = new SpeechRecognition();
  recognition.lang = "zh-CN";
  recognition.onresult = (e) => {
    document.getElementById("chatInput").value = e.results[0][0].transcript;
  };
  recognition.start();
}

function speakResponse(text) {
  if (window.speechSynthesis) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "zh-CN";
    window.speechSynthesis.speak(utterance);
  }
}

// --- 初始化检查 ---
window.onload = () => {
  const saved = localStorage.getItem("vvr_user");
  if (saved) {
    currentUser = JSON.parse(saved);
    showMainInterface();
  }
  
  // 回车监听
  document.getElementById("chatInput").onkeydown = (e) => { if(e.key === "Enter") handleSend(); };
};
</script>

</body>
</html>
