<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #007aff; --accent: #ff3b30; --bg: #000; --card: #1c1c1e; }
    body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* 精美登录 */
    #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 80%; max-width: 300px; text-align: center; }
    .login-box h1 { font-size: 24px; margin-bottom: 25px; font-weight: 500; }
    .login-box input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; background: var(--card); color: white; box-sizing: border-box; outline: none; }
    .login-box button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: 600; margin-top: 20px; cursor: pointer; }

    /* 导航 */
    nav { display: flex; justify-content: center; padding: 15px 0; border-bottom: 0.5px solid #333; gap: 25px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    nav button { background: none; border: none; color: #888; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.3s; position: relative; }
    nav button.active { color: #fff; }
    nav button.active::after { content: ''; position: absolute; bottom: -15px; left: 0; width: 100%; height: 2px; background: var(--primary); }

    .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .page.active { display: flex; }

    /* 对话框 & 留言卡片 */
    .scroll-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; }
    .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
    .bot { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }

    .circle-card { background: var(--card); padding: 16px; border-radius: 14px; margin-bottom: 10px; border-left: 3px solid var(--primary); position: relative; }
    .circle-user { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 4px; }

    /* 输入栏 */
    .input-bar { padding: 10px 15px 35px; background: var(--bg); display: flex; gap: 10px; }
    .input-bar input { flex: 1; background: #1c1c1e; border: none; padding: 12px 18px; border-radius: 20px; color: white; outline: none; }
    .input-bar button { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; font-weight: bold; cursor: pointer; }

    /* 语音界面 */
    .voice-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .v-ring { width: 140px; height: 140px; border-radius: 50%; background: #1c1c1e; display: flex; align-items: center; justify-content: center; border: 2px solid #333; transition: 0.4s; }
    .speaking { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,122,255,0.4); }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h1>系统登录</h1>
    <input type="text" id="acc" placeholder="账号">
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="login()">登录</button>
  </div>
</div>

<nav>
  <button onclick="setTab('voice')" id="t-voice" class="active">深度语音</button>
  <button onclick="setTab('chat')" id="t-chat">和 VVR 对话</button>
  <button onclick="setTab('circle')" id="t-circle">秘密小圈</button>
</nav>

<div id="p-voice" class="page active">
  <div class="voice-main">
    <div id="v-ring" class="v-ring"><div style="width:50px;height:50px;background:var(--primary);border-radius:50%;filter:blur(15px);opacity:0.5;"></div></div>
    <p id="v-status" style="margin-top:30px; color:#666;">等待呼叫</p>
  </div>
  <div style="padding-bottom:60px; display:flex; justify-content:center; gap:30px;">
    <button onclick="startVoice()" style="width:70px;height:70px;border-radius:50%;background:#34c759;border:none;font-size:28px;">📞</button>
    <button onclick="location.reload()" style="width:70px;height:70px;border-radius:50%;background:#ff3b30;border:none;font-size:28px;">✕</button>
  </div>
</div>

<div id="p-chat" class="page">
  <div id="chat-list" class="scroll-area"></div>
  <div class="input-bar">
    <input id="chat-in" placeholder="输入消息...">
    <button onclick="sendChat()">↑</button>
  </div>
</div>

<div id="p-circle" class="page">
  <div id="circle-list" class="scroll-area"></div>
  <div class="input-bar">
    <input id="circle-in" placeholder="发布到小圈...">
    <button onclick="sendToCircle()" style="background:var(--accent)">↑</button>
  </div>
</div>

<script>
// 1. 变量隔离：使用唯一变量名 vvrStorage 避免重复定义报错
const VVR_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co"; 
const VVR_KEY = "sb_publishable_lQYWTuCHC62vrRd-9DU3GQ_rRInvutu";
const vvrStorage = supabase.createClient(VVR_URL, VVR_KEY);

let activeUser = "";
let voiceOn = false;
let chatHistory = [];
const synth = window.speechSynthesis;
let rec;

// 2. 登录函数：名字严格匹配 HTML 里的 onclick="login()"
function login() {
    const a = document.getElementById('acc').value.trim();
    const p = document.getElementById('pwd').value;
    if((a==='xiaola'&&p==='123456') || (a==='vvr'&&p==='654321')) {
        activeUser = a;
        document.getElementById('login-overlay').style.display = 'none';
        syncCircle();
    } else {
        alert("验证失败");
    }
}

// 3. 秘密小圈：修复发送逻辑
async function sendToCircle() {
    const input = document.getElementById('circle-in');
    const val = input.value.trim();
    if(!val) return;
    
    // 使用 vvrStorage 插入数据
    const { error } = await vvrStorage.from('messages').insert([{ author: activeUser, content: val, created_at: new Date() }]);
    if(!error) {
        input.value = "";
        syncCircle();
    } else {
        console.error("发送失败:", error);
    }
}

async function syncCircle() {
    const { data } = await vvrStorage.from('messages').select('*').order('created_at', { ascending: false });
    if(data) {
        const box = document.getElementById('circle-list');
        box.innerHTML = "";
        data.forEach(m => {
            const d = document.createElement('div');
            d.className = "circle-card";
            d.innerHTML = `<div class="circle-user">${m.author}</div><div>${m.content}</div>`;
            box.appendChild(d);
        });
    }
}

// 4. 对话核心：深度语音有声，和 VVR 对话静音
async function handleMsg(text, isSilent) {
    if(!isSilent) document.getElementById('v-status').innerText = "VVR 正在思考...";
    if(isSilent) appendBubble(text, 'user');

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: chatHistory })
        });
        const data = await res.json();
        if(data.reply) {
            chatHistory.push({role:"user", content:text}, {role:"assistant", content:data.reply});
            if(isSilent) {
                appendBubble(data.reply, 'bot'); // 静音模式不执行 speak
            } else {
                vvrSpeak(data.reply);
            }
        }
    } catch(e) { console.error(e); }
}

// 语音模式控制
function startVoice() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    rec = new Speech(); rec.lang = 'en-US';
    rec.onresult = (e) => handleMsg(e.results[0][0].transcript, false);
    rec.onend = () => { if(voiceOn && !synth.speaking) rec.start(); };
    voiceOn = true;
    synth.speak(new SpeechSynthesisUtterance("")); // 激活移动端音频
    vvrSpeak("Secure line active.");
}

function vvrSpeak(text) {
    const u = new SpeechSynthesisUtterance(text.replace(/[*_#~`[\]()<>\\|{}]/g, ' '));
    u.lang = 'en-US';
    u.onstart = () => { 
        document.getElementById('v-ring').classList.add('speaking'); 
        if(rec) try{rec.stop()}catch(e){} 
    };
    u.onend = () => { 
        document.getElementById('v-ring').classList.remove('speaking'); 
        if(voiceOn) setTimeout(()=>rec.start(), 500); 
    };
    synth.speak(u);
}

// 文字模式控制 (静音)
function sendChat() {
    const input = document.getElementById('chat-in');
    if(input.value.trim()) {
        handleMsg(input.value.trim(), true);
        input.value = "";
    }
}

// UI 切换
function setTab(t) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('p-'+t).classList.add('active');
    document.getElementById('t-'+t).classList.add('active');
    if(t === 'circle') syncCircle();
}

function appendBubble(t, c) {
    const box = document.getElementById('chat-list');
    const d = document.createElement('div'); d.className=`bubble ${c}`; d.innerText=t;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
