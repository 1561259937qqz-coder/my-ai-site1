<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR Control Call</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #121212; color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 0; box-sizing: border-box; }
    
    /* 状态显示 */
    .avatar { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, #6e8efb, #a777e3); display: flex; align-items: center; justify-content: center; font-size: 60px; transition: 0.5s; border: 4px solid #333; }
    .vvr-speaking { border-color: #ff6b81; box-shadow: 0 0 30px rgba(255, 107, 129, 0.4); }
    .user-speaking { border-color: #34c759; box-shadow: 0 0 30px rgba(52, 199, 89, 0.4); }

    #info { text-align: center; }
    #info h1 { margin: 0; font-size: 26px; }
    #status-msg { color: #888; margin-top: 10px; font-size: 14px; height: 20px; }
    #transcript { padding: 0 30px; text-align: center; color: #ccc; font-size: 15px; line-height: 1.6; max-width: 80%; flex-grow: 1; display: flex; align-items: center; }

    /* 按钮区域 */
    .controls { display: flex; flex-direction: column; gap: 20px; width: 100%; align-items: center; }
    .row { display: flex; gap: 30px; }
    
    .btn { border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: white; }
    .btn:active { transform: scale(0.9); }
    
    .btn-main { width: 80px; height: 80px; font-size: 30px; }
    .btn-action { width: 160px; height: 50px; border-radius: 25px; font-size: 16px; font-weight: bold; }

    .call { background: #34c759; }
    .hangup { background: #ff3b30; }
    .interrupt { background: #5856d6; box-shadow: 0 4px 15px rgba(88, 86, 214, 0.3); }
    .disabled { background: #333 !important; color: #666; cursor: not-allowed; box-shadow: none; }
  </style>
</head>
<body>

  <div id="info">
    <div id="v-avatar" class="avatar">V</div>
    <h1 style="margin-top:20px;">VVR</h1>
    <div id="status-msg">已准备好通话</div>
  </div>

  <div id="transcript">建议佩戴耳机获得最佳通话效果</div>

  <div class="controls">
    <button id="intBtn" class="btn btn-action interrupt disabled" onclick="manualInterrupt()" disabled>我要说话 (插嘴)</button>
    
    <div class="row">
      <button id="startBtn" class="btn btn-main call" onclick="startCall()">📞</button>
      <button id="endBtn" class="btn btn-main hangup" style="display:none;" onclick="location.reload()">❌</button>
    </div>
  </div>

<script>
let rec;
let isCallActive = false;
let history = [];
const synth = window.speechSynthesis;

// 初始化
function init() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Speech) return alert("请使用 Safari (iOS) 或 Chrome (Android)");
    rec = new Speech();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;

    rec.onstart = () => {
        updateUI('user');
    };

    rec.onresult = (e) => {
        const text = e.results[0][0].transcript;
        sendMsg(text);
    };

    rec.onend = () => {
        if (isCallActive && !synth.speaking) {
            // 正常结束，等待中
            updateUI('idle');
        }
    };
}

// 通话控制
function startCall() {
    init();
    isCallActive = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('endBtn').style.display = 'flex';
    document.getElementById('intBtn').classList.remove('disabled');
    document.getElementById('intBtn').disabled = false;
    
    // 激活音频
    synth.speak(new SpeechSynthesisUtterance(""));
    vvrTalk("VVR is connected. I'm listening to you now.");
}

// 【新增功能】手动插嘴/暂停
function manualInterrupt() {
    if (!isCallActive) return;
    
    // 1. 立即停止 AI 说话
    if (synth.speaking) {
        synth.cancel();
        console.log("手动打断 VVR");
    }
    
    // 2. 强制开启麦克风听我说话
    try {
        rec.stop(); // 先停再开，确保重置
        setTimeout(() => rec.start(), 200);
    } catch(e) {
        rec.start();
    }
    
    document.getElementById('transcript').innerText = "请说，我在听...";
}

// 核心对话
async function sendMsg(text) {
    document.getElementById('transcript').innerText = "你: " + text;
    updateUI('thinking');

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: history })
        });
        const data = await res.json();
        if (data.reply) {
            history.push({ role: "user", content: text }, { role: "assistant", content: data.reply });
            vvrTalk(data.reply);
        }
    } catch (e) {
        document.getElementById('status-msg').innerText = "连接失败";
    }
}

function vvrTalk(text) {
    const clean = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = 'en-US';

    utter.onstart = () => {
        updateUI('vvr');
        document.getElementById('transcript').innerText = "VVR: " + text;
    };

    utter.onend = () => {
        if (isCallActive) {
            updateUI('idle');
            // 如果你希望 AI 说完后自动听，就加下面这句；
            // 如果希望完全手动控制，就注释掉下面这句，只靠“我要说话”按钮。
            setTimeout(() => { if(!synth.speaking) rec.start(); }, 400);
        }
    };

    synth.speak(utter);
}

// UI 状态切换
function updateUI(state) {
    const av = document.getElementById('v-avatar');
    const msg = document.getElementById('status-msg');
    
    av.className = "avatar";
    if (state === 'vvr') {
        av.classList.add('vvr-speaking');
        msg.innerText = "VVR 正在说话...";
    } else if (state === 'user') {
        av.classList.add('user-speaking');
        msg.innerText = "正在听你说话...";
    } else if (state === 'thinking') {
        msg.innerText = "VVR 正在思考...";
    } else {
        msg.innerText = "通话中...";
    }
}
</script>
</body>
</html>
