<!DOCTYPE html>
<html>
<head>
  <title>vvraizth AI</title>

  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .row {
      display: flex;
      align-items: flex-end;
      margin: 10px 0;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin: 0 10px;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 20px;
      max-width: 60%;
      animation: pop 0.3s ease;
    }

    .user {
      background: #4facfe;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: white;
      color: #333;
    }

    #inputArea {
      display: flex;
      padding: 15px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 10px 20px;
      background: #ff6b81;
      border: none;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.1);
    }

    @keyframes pop {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Talk to your cute AI..." />
  <button onclick="send()">Send</button>
</div>

<script>
  let history = [];

  function createMessage(text, type) {
    const row = document.createElement("div");
    row.className = "row";

    const avatar = document.createElement("img");
    avatar.className = "avatar";

    const msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;

    if (type === "bot") {
      avatar.src = "https://cdn-icons-png.flaticon.com/512/4712/4712027.png";
      row.appendChild(avatar);
      row.appendChild(msg);
    } else {
      avatar.src = "https://cdn-icons-png.flaticon.com/512/847/847969.png";
      row.appendChild(msg);
      row.appendChild(avatar);
      row.style.justifyContent = "flex-end";
    }

    document.getElementById("chat").appendChild(row);
    row.scrollIntoView();
    return msg;
  }

  function typeEffect(el, text) {
    let i = 0;
    el.innerText = "";
    const timer = setInterval(() => {
      el.innerText += text[i];
      i++;
      if (i >= text.length) clearInterval(timer);
    }, 20);
  }

  async function send() {
    const input = document.getElementById("input");
    const message = input.value;
    if (!message) return;

    createMessage(message, "user");
    input.value = "";

    history.push({ role: "user", content: message });

    const botMsg = createMessage("Thinking...", "bot");

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message, history })
    });

    const data = await res.json();

    history.push({ role: "assistant", content: data.reply });

    typeEffect(botMsg, data.reply);
  }

  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") send();
  });
</script>

</body>
</html>
