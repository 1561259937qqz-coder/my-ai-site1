<!DOCTYPE html>
<html>
<head>
  <title>VVR AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    #chatPage {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      max-width: 60%;
    }

    .user {
      background: #4facfe;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #eee;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #ddd;
    }

    #inputArea input {
      flex: 1;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

  </style>
</head>

<body>

<!-- 登录页 -->
<div id="loginPage" class="center">
  <div class="card">
    <h2>Login</h2>
    <input id="username" placeholder="Enter your name" />
    <input id="avatar" placeholder="Paste avatar URL (可选)" />
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- 聊天页 -->
<div id="chatPage">
  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Talk to VVR..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
  let user = null;
  let history = [];

  function login() {
    const name = document.getElementById("username").value;
    let avatar = document.getElementById("avatar").value;

    if (!name) {
      alert("请输入名字");
      return;
    }

    if (!avatar) {
      avatar = "https://api.dicebear.com/7.x/adventurer/png?seed=" + name;
    }

    user = { name, avatar };

    localStorage.setItem("user", JSON.stringify(user));

    showChat();
  }

  function showChat() {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("chatPage").style.display = "flex";

    user = JSON.parse(localStorage.getItem("user"));
  }

  function createMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
  }

  async function send() {
    const input = document.getElementById("input");
    const message = input.value;
    if (!message) return;

    createMessage(message, "user");
    input.value = "";

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message, history })
    });

    const data = await res.json();

    createMessage(data.reply, "bot");
  }

  // 自动登录
  if (localStorage.getItem("user")) {
    showChat();
  }
</script>

</body>
</html>
