<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #007aff; --accent: #ff3b30; --bg: #000000; --card: #1c1c1e; --glass: rgba(28, 28, 30, 0.7); }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #ffffff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* 高级感登录界面 */
    #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 85%; max-width: 340px; text-align: center; padding: 40px 20px; }
    .login-box h1 { font-weight: 600; font-size: 28px; margin-bottom: 30px; letter-spacing: -1px; }
    .login-box input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: var(--card); color: white; font-size: 16px; box-sizing: border-box; }
    .login-box button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 600; font-size: 16px; margin-top: 25px; cursor: pointer; transition: opacity 0.2s; }
    .login-box button:active { opacity: 0.7; }

    /* 顶部导航 */
    nav { display: flex; justify-content: center; background: var(--glass); backdrop-filter: blur(20px); padding: 15px 0; border-bottom: 0.5px solid #333; gap: 30px; }
    nav button { background: none; border: none; color: #8e8e93; font-weight: 500; font-size: 15px; cursor: pointer; transition: 0.3s; position: relative; }
    nav button.active { color: #ffffff; }
    nav button.active::after { content: ''; position: absolute; bottom: -15px; left: 0; width: 100%; height: 2px; background: var(--primary); }

    .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .page.active { display: flex; }

    /* 聊天气泡 */
    .scroll-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; animation: bubbleIn 0.3s ease-out; }
    @keyframes bubbleIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .user { background: var(--primary); align-self: flex-end; color: white; border-bottom-right-radius: 4px; }
    .bot { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; }

    /* 秘密小圈卡片 */
    .circle-card { background: var(--card); padding: 16px; border-radius: 14px; position: relative; margin-bottom: 8px; border-left: 3px solid var(--primary); }
    .circle-user { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 6px; }
    .circle-time { font-size: 10px; color: #48484a; position: absolute; right: 16px; top: 16px; }

    /* 输入区域 */
    .input-bar { padding: 10px 16px 34px; background: var(--bg); display: flex; gap: 10px; align-items: center; }
    .input-bar input { flex: 1; background: #1c1c1e; border: none; padding: 12px 18px; border-radius: 22px; color: white; font-size: 15px; outline: none; }
    .input-bar button { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* 语音界面 */
    .call-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ava-ring { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle, #2c2c2e 0%, #000 100%); display: flex; align-items: center; justify-content: center; position: relative; }
    .ava-inner { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); filter: blur(20px); opacity: 0.3; transition: 0.5s; }
    .speaking .ava-inner { opacity: 0.8; transform: scale(1.5); filter: blur(30px); }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h1>系统登录</h1>
    <input type="text" id="acc" placeholder="账号">
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="handleLogin()">登录</button>
  </div>
</div>

<nav>
  <button onclick="setTab('voice')" id="t-voice" class="active">深度语音</button>
  <button onclick="setTab('chat')" id="t-chat">和 VVR 对话</button>
  <button onclick="setTab('circle')" id="t-circle">秘密小圈</button>
</nav>

<div id="p-voice" class="page active">
  <div class="call-container">
    <div id="v-ring" class="ava-ring"><div class="ava-inner"></div></div>
    <p id="v-status" style="margin-top:40px; color:#8e8e93; font-size:14px;">就绪</p>
  </div>
  <div style="padding-bottom:60px; display:flex; justify-content:center; gap:30px;">
    <button id="s-btn" onclick="startVoiceMode()" style="width:70px;height:70px;border-radius:50%;background:#34c759;border:none;font-size:28px;">📞</button>
    <button onclick="location.reload()" style="width:70px;height:70px;border-radius:50%;background:#ff3b30;border:none;font-size:28px;">✕</button>
  </div>
</div>

<div id="p-chat" class="page">
  <div id="chat-list" class="scroll-area"></div>
  <div class="input-bar">
    <input id="chat-in" placeholder="输入消息...">
    <button onclick="sendSilentChat()">↑</button>
  </div>
</div>

<div id="p-circle" class="page">
  <div id="circle-list" class="scroll-area"></div>
  <div class="input-bar">
    <input id="circle-in" placeholder="分享到小圈...">
    <button onclick="postToCircle()" style="background:var(--accent)">↑</button>
  </div>
</div>

<script>
const S_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co"; 
const S_KEY = "sb_publishable_lQYWTuCHC62vrRd-9DU3GQ_rRInvutu";
const supabase = supabase.createClient(S_URL, S_KEY);

let user = "";
let isVoiceActive = false;
let history = [];
const synth = window.speechSynthesis;
let rec;

// 1. 登录
function handleLogin() {
    const a = document.getElementById('acc').value.trim();
    const p = document.getElementById('pwd').value;
    if((a==='xiaola'&&p==='123456') || (a==='vvr'&&p==='654321')) {
        user = a;
        document.getElementById('login-overlay').style.display = 'none';
        loadCircle();
    } else alert("账号或密码错误");
}

// 2. 秘密小圈逻辑 (修复无法发送)
async function postToCircle() {
    const input = document.getElementById('circle-in');
    const val = input.value.trim();
    if(!val) return;
    
    const { error } = await supabase.from('messages').insert([{ author: user, content: val, created_at: new Date() }]);
    if(!error) {
        input.value = "";
        loadCircle();
    } else {
        console.error(error);
    }
}

async function loadCircle() {
    const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false });
    if(data) {
        const box = document.getElementById('circle-list');
        box.innerHTML = "";
        data.forEach(m => {
            const d = document.createElement('div');
            d.className = "circle-card";
            d.innerHTML = `<span class="circle-time">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                           <div class="circle-user">${m.author}</div><div>${m.content}</div>`;
            box.appendChild(d);
        });
    }
}

// 3. 核心对话逻辑
async function talkToAI(text, silent) {
    if(!silent) document.getElementById('v-status').innerText = "VVR 正在思考...";
    else appendBubble(text, 'user');

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: history })
        });
        const data = await res.json();
        if(data.reply) {
            history.push({role:"user", content:text}, {role:"assistant", content:data.reply});
            if(silent) {
                appendBubble(data.reply, 'bot');
            } else {
                speakText(data.reply);
            }
        }
    } catch(e) { console.error(e); }
}

// 4. 语音模式专用
function startVoiceMode() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    rec = new Speech(); rec.lang = 'en-US';
    rec.onresult = (e) => talkToAI(e.results[0][0].transcript, false);
    rec.onend = () => { if(isVoiceActive && !synth.speaking) rec.start(); };
    isVoiceActive = true;
    document.getElementById('s-btn').style.opacity = '0.3';
    synth.speak(new SpeechSynthesisUtterance(""));
    speakText("Voice mode activated.");
}

function speakText(text) {
    const clean = text.replace(/[*_#~`[\]()<>\\|{}]/g, ' ');
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'en-US';
    u.onstart = () => { document.getElementById('v-ring').classList.add('speaking'); if(rec) try{rec.stop()}catch(e){} };
    u.onend = () => { document.getElementById('v-ring').classList.remove('speaking'); if(isVoiceActive) setTimeout(()=>rec.start(), 500); };
    synth.speak(u);
}

// 5. 静音聊天
function sendSilentChat() {
    const input = document.getElementById('chat-in');
    if(input.value.trim()) {
        talkToAI(input.value.trim(), true);
        input.value = "";
    }
}

// UI 辅助
function setTab(t) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('p-'+t).classList.add('active');
    document.getElementById('t-'+t).classList.add('active');
    if(t === 'circle') loadCircle();
}

function appendBubble(t, c) {
    const box = document.getElementById('chat-list');
    const d = document.createElement('div'); d.className=`bubble ${c}`; d.innerText=t;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
