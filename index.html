<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #007aff; --accent: #ff3b30; --bg: #000; --card: #1c1c1e; }
    body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* 登录 */
    #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 80%; max-width: 300px; text-align: center; }
    .login-box input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; background: var(--card); color: white; box-sizing: border-box; outline: none; }
    .login-box button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 600; margin-top: 20px; cursor: pointer; }

    /* 导航栏 */
    nav { display: flex; justify-content: center; padding: 15px 0; border-bottom: 0.5px solid #333; gap: 25px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    nav button { background: none; border: none; color: #888; font-size: 15px; font-weight: 500; cursor: pointer; position: relative; }
    nav button.active { color: #fff; }
    nav button.active::after { content: ''; position: absolute; bottom: -15px; left: 0; width: 100%; height: 2px; background: var(--primary); }

    .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .page.active { display: flex; }

    /* 聊天气泡 */
    .scroll-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; }
    .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
    .bot { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; }

    /* 秘密小圈卡片 */
    .post-card { background: var(--card); padding: 18px; margin-bottom: 15px; border-radius: 16px; border: 1px solid #2c2c2e; }
    .post-user { color: var(--primary); font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
    .post-text { font-size: 15px; line-height: 1.5; margin: 10px 0; }
    .comment-item { font-size: 12px; background: #2c2c2e; padding: 6px 10px; margin-top: 6px; border-radius: 8px; color: #ccc; }

    /* 输入栏 */
    .input-bar { padding: 10px 15px 35px; background: var(--bg); display: flex; gap: 10px; border-top: 0.5px solid #222; }
    .input-bar input { flex: 1; background: #1c1c1e; border: none; padding: 12px 18px; border-radius: 22px; color: white; outline: none; }
    .input-bar button { background: var(--primary); border: none; padding: 0 15px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; }

    /* 语音环 */
    .v-ring { width: 140px; height: 140px; border-radius: 50%; background: #1c1c1e; display: flex; align-items: center; justify-content: center; border: 2px solid #333; }
    .speaking { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,122,255,0.4); }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h1 style="font-size:22px; margin-bottom:30px;">系统登录</h1>
    <input type="text" id="acc" placeholder="Username">
    <input type="password" id="pwd" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<nav>
  <button onclick="setTab('voice')" id="t-voice" class="active">深度语音</button>
  <button onclick="setTab('chat')" id="t-chat">和 VVR 对话</button>
  <button onclick="setTab('circle')" id="t-circle">秘密小圈</button>
</nav>

<div id="p-voice" class="page active">
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div id="v-ring" class="v-ring"><div style="width:40px;height:40px;background:var(--primary);border-radius:50%;filter:blur(10px);opacity:0.6;"></div></div>
    <p id="v-status" style="margin-top:30px; color:#666;">等待呼叫</p>
  </div>
  <div style="padding-bottom:60px; display:flex; justify-content:center; gap:30px;">
    <button onclick="startVoice()" id="v-btn" style="width:70px;height:70px;border-radius:50%;background:#34c759;border:none;font-size:28px;">📞</button>
    <button onclick="location.reload()" style="width:70px;height:70px;border-radius:50%;background:#ff3b30;border:none;font-size:28px;">✕</button>
  </div>
</div>

<div id="p-chat" class="page">
  <div id="chat-list" class="scroll-area"></div>
  <div class="input-bar">
    <input id="chat-in" placeholder="输入消息...">
    <button onclick="sendChat()">发送</button>
  </div>
</div>

<div id="p-circle" class="page">
  <div id="circle-list" class="scroll-area">正在同步...</div>
  <div class="input-bar">
    <input id="circle-in" placeholder="分享动态...">
    <button onclick="publishPost()" style="background:var(--accent)">发布</button>
  </div>
</div>

<script>
const SB_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co";
const SB_KEY = "sb_publishable_lQYWTuCHC62vrRd-9DU3GQ_rRInvutu";
const vvrSB = supabase.createClient(SB_URL, SB_KEY);

let currentUser = "";
let isVoiceOn = false;
let history = [];
const synth = window.speechSynthesis;
let rec = null;

// 1. 登录
function login() {
    const u = document.getElementById('acc').value.trim();
    const p = document.getElementById('pwd').value;
    // 账号密码对齐你的 userList
    if((u==='vvr'&&p==='031210') || (u==='xiaola'&&p==='060530') || (u==='user1'&&p==='123')) {
        currentUser = u;
        document.getElementById('login-overlay').style.display = 'none';
        renderCircle();
    } else { alert("验证失败"); }
}

// 2. 秘密小圈 (对齐你原本的 posts 表)
async function publishPost() {
    const val = document.getElementById("circle-in").value.trim();
    if(!val) return;
    // 强制使用你原本的字段名: user, text, comments
    const { error } = await vvrSB.from('posts').insert([{ user: currentUser, text: val, comments: [] }]);
    if(!error) {
        document.getElementById("circle-in").value = "";
        renderCircle();
    } else { alert("发送失败，请确保数据库存在 posts 表"); }
}

async function renderCircle() {
    const box = document.getElementById("circle-list");
    const { data, error } = await vvrSB.from('posts').select('*').order('id', { ascending: false });
    if(error) { box.innerText = "同步受阻"; return; }
    
    box.innerHTML = data.map(p => `
        <div class="post-card">
            <span class="post-user">@${p.user}</span>
            <p class="post-text">${p.text}</p>
            <div>${(p.comments || []).map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('')}</div>
            <div style="display:flex; margin-top:12px; gap:8px;">
                <input id="in-${p.id}" style="background:#222; margin:0; padding:8px; font-size:12px;" placeholder="回复...">
                <button onclick="addComment(${p.id})" style="padding:0 12px; font-size:12px;">回复</button>
            </div>
        </div>
    `).join('') || "暂无动态";
}

async function addComment(id) {
    const input = document.getElementById(`in-${id}`);
    if(!input.value.trim()) return;
    const { data } = await vvrSB.from('posts').select('comments').eq('id', id).single();
    const newList = [...(data.comments || []), { user: currentUser, text: input.value }];
    await vvrSB.from('posts').update({ comments: newList }).eq('id', id);
    input.value = ""; renderCircle();
}

// 3. 对话逻辑 (silent 为 true 时不发声)
async function askVVR(text, silent) {
    if(!silent) document.getElementById('v-status').innerText = "VVR 正在思考...";
    if(silent) appendBubble(text, 'user');

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: history })
        });
        const data = await res.json();
        if(data.reply) {
            history.push({role:"user", content:text}, {role:"assistant", content:data.reply});
            if(silent) appendBubble(data.reply, 'bot');
            else vvrSpeak(data.reply);
        }
    } catch(e) { console.error(e); }
}

function sendChat() {
    const input = document.getElementById('chat-in');
    if(input.value.trim()) { askVVR(input.value.trim(), true); input.value = ""; }
}

function appendBubble(t, c) {
    const box = document.getElementById('chat-list');
    const d = document.createElement("div"); d.className = "bubble " + c; d.innerText = t;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}

// 4. 语音逻辑
function startVoice() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Speech) return alert("不支持语音");
    rec = new Speech(); rec.lang = 'zh-CN';
    rec.onresult = (e) => askVVR(e.results[0][0].transcript, false);
    rec.onend = () => { if(isVoiceOn && !synth.speaking) rec.start(); };
    isVoiceOn = true;
    document.getElementById('v-btn').style.opacity = '0.3';
    document.getElementById('v-status').innerText = "请说话...";
    synth.speak(new SpeechSynthesisUtterance("")); 
    rec.start();
}

function vvrSpeak(text) {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.onstart = () => { 
        document.getElementById('v-ring').classList.add('speaking'); 
        if(rec) rec.stop(); 
    };
    u.onend = () => { 
        document.getElementById('v-ring').classList.remove('speaking'); 
        if(isVoiceOn) rec.start(); 
    };
    synth.speak(u);
}

function setTab(t) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('p-'+t).classList.add('active');
    document.getElementById('t-'+t).classList.add('active');
    if(t === 'circle') renderCircle();
    if(t !== 'voice') { isVoiceOn = false; if(rec) rec.stop(); }
}
</script>
</body>
</html>
