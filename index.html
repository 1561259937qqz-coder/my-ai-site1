<!DOCTYPE html>
<html>
<head>
  <title>VVR World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .page {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .active {
      display: flex;
    }

    .center {
      justify-content: center;
      align-items: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #ff6b81;
      color: white;
      cursor: pointer;
    }

    #chat, #posts {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg, .post {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .user { background: #4facfe; color: white; }

    #nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- 登录页 -->
<div id="loginPage" class="page active center">
  <div>
    <h2>Login</h2>
    <input id="username" placeholder="username">
    <input id="password" placeholder="password" type="password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- 主界面 -->
<div id="mainPage" class="page">

  <div id="chatPage" class="page active">
    <div id="chat"></div>
    <input id="chatInput" placeholder="Talk to VVR...">
    <button onclick="send()">Send</button>
  </div>

  <div id="postPage" class="page">
    <div id="posts"></div>
    <input id="postInput" placeholder="Write something...">
    <button onclick="addPost()">Post</button>
  </div>

  <div id="nav">
    <button onclick="show('chatPage')">Chat</button>
    <button onclick="show('postPage')">Community</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
const users = [
  { username: "user1", password: "123" },
  { username: "user2", password: "456" }
];

let currentUser = null;
let history = [];
let posts = JSON.parse(localStorage.getItem("posts") || "[]");

function login() {
  const name = username.value;
  const pass = password.value;

  const user = users.find(u => u.username === name && u.password === pass);
  if (!user) return alert("wrong");

  user.avatar = "https://api.dicebear.com/7.x/adventurer/png?seed=" + name;

  localStorage.setItem("user", JSON.stringify(user));
  currentUser = user;

  showMain();
}

function showMain() {
  loginPage.classList.remove("active");
  mainPage.classList.add("active");
  renderPosts();
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function show(page) {
  chatPage.classList.remove("active");
  postPage.classList.remove("active");
  document.getElementById(page).classList.add("active");
}

function createMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
}

async function send() {
  const msg = chatInput.value;
  if (!msg) return;

  createMsg(msg, "user");
  chatInput.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg, history })
  });

  const data = await res.json();
  createMsg(data.reply, "bot");
}

function addPost() {
  const text = postInput.value;
  if (!text) return;

  posts.push({
    user: currentUser.username,
    text,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  postInput.value = "";
  renderPosts();
}

function addComment(i) {
  const input = document.getElementById("c"+i);
  posts[i].comments.push({
    user: currentUser.username,
    text: input.value
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  renderPosts();
}

function renderPosts() {
  postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  posts.forEach((p,i)=>{
    let html = `<div class="post">
      <b>${p.user}</b><br>${p.text}<br>
      <input id="c${i}" placeholder="comment">
      <button onclick="addComment(${i})">send</button>
      <div>`;

    p.comments.forEach(c=>{
      html += `<p>${c.user}: ${c.text}</p>`;
    });

    html += "</div></div>";

    postsDiv.innerHTML += html;
  });
}

// 自动登录
const saved = localStorage.getItem("user");
if (saved) {
  currentUser = JSON.parse(saved);
  showMain();
}
</script>

</body>
</html>
