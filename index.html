<!DOCTYPE html>
<html>
<head>
  <title>vvraizth AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 60%;
    }

    .user {
      background: #0b93f6;
      align-self: flex-end;
    }

    .bot {
      background: #444654;
      align-self: flex-start;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #40414f;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: #19c37d;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Type something..." />
    <button onclick="send()">Send</button>
  </div>

  <script>
    function addMessage(text, className) {
      const chat = document.getElementById("chat");
      const msg = document.createElement("div");
      msg.className = "msg " + className;
      msg.innerText = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const input = document.getElementById("input");
      const message = input.value;

      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      addMessage(data.reply, "bot");
    }
  </script>

</body>
</html>
