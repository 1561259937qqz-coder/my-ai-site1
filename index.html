<!DOCTYPE html>
<html>
<head>
  <title>VVR World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI";
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .page { display:none; height:100vh; flex-direction:column; }
    .active { display:flex; }
    .center { justify-content:center; align-items:center; }

    .card {
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      text-align:center;
    }

    input {
      width:90%;
      padding:10px;
      margin:8px;
      border-radius:10px;
      border:none;
      background:#f1f1f1;
    }

    button {
      padding:10px 15px;
      border-radius:10px;
      border:none;
      background:#ff6b81;
      color:white;
      cursor:pointer;
    }

    #chat, #posts {
      flex:1;
      overflow:auto;
      padding:10px;
    }

    .msg {
      margin:8px;
      padding:10px;
      border-radius:10px;
      max-width:70%;
    }

    .user { background:#4facfe; color:white; margin-left:auto; }
    .bot { background:white; }

    .post {
      background:white;
      padding:10px;
      margin:10px;
      border-radius:15px;
    }

    #nav {
      display:flex;
      justify-content:space-around;
      background:white;
      padding:10px;
    }

    #inputArea { display:flex; padding:10px; background:white; }
    #inputArea input { flex:1; }

  </style>
</head>

<body>

<div id="loginPage" class="page active center">
  <div class="card">
    <h2>Login</h2>
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="mainPage" class="page">

  <div id="chatPage" class="page active">
    <div id="chat"></div>

    <div id="inputArea">
      <input id="chatInput" placeholder="Talk to VVR...">
      <button onclick="send()">Send</button>
      <button onclick="startVoice()">🎤</button>
    </div>
  </div>

  <div id="postPage" class="page">
    <div id="posts"></div>

    <div id="inputArea">
      <input id="postInput" placeholder="Say something...">
      <button onclick="addPost()">Post</button>
    </div>
  </div>

  <div id="nav">
    <button onclick="show('chatPage')">Chat</button>
    <button onclick="show('postPage')">Community</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co";
const SUPABASE_KEY = "sb_publishable_lQYWTuCHC62vrRd-9DU3GQ_rRInvutu";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 固定用户
const users = [
  { username: "xiaola", password: "060530" },
  { username: "vvr", password: "031210" }
];

let currentUser = null;
let history = [];
let posts = [];

// 登录
function login() {
  const name = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const user = users.find(u => u.username === name && u.password === pass);
  if (!user) {
    alert("账号或密码错误");
    return;
  }

  currentUser = user;
  localStorage.setItem("user", JSON.stringify(user));
  showMain();
}

function showMain() {
  loginPage.classList.remove("active");
  mainPage.classList.add("active");
  loadPosts();
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function show(page) {
  chatPage.classList.remove("active");
  postPage.classList.remove("active");
  document.getElementById(page).classList.add("active");
}

// 聊天
function createMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  div.scrollIntoView();
}

async function send() {
  const msg = chatInput.value;
  if (!msg) return;

  createMsg(msg, "user");
  chatInput.value = "";

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: msg, history })
  });

  const data = await res.json();
  createMsg(data.reply, "bot");
  speak(data.reply);
}

// 回车发送
chatInput.addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});

// 🎤 语音
function startVoice(){
  const r = new webkitSpeechRecognition();
  r.lang="en-US";

  r.onresult = e=>{
    chatInput.value = e.results[0][0].transcript;
    send();
  };

  r.start();
}

// 🔊 AI说话
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(u);
}

// 发帖
async function addPost(){
  const text = postInput.value;
  if(!text) return;

  await supabase.from("posts").insert([
    { user: currentUser.username, text, comments: [] }
  ]);

  postInput.value="";
  loadPosts();
}

// 读取
async function loadPosts(){
  const { data } = await supabase.from("posts").select("*");
  posts = data || [];
  renderPosts();
}

// 评论
async function addComment(i){
  const input = document.getElementById("c"+i);
  if(!input.value) return;

  let post = posts[i];

  post.comments.push({
    user: currentUser.username,
    text: input.value
  });

  await supabase.from("posts")
    .update({ comments: post.comments })
    .eq("id", post.id);

  loadPosts();
}

// 渲染
function renderPosts(){
  const div = document.getElementById("posts");
  div.innerHTML="";

  posts.forEach((p,i)=>{
    let html = `<div class="post">
      <b>${p.user}</b><br>${p.text}<br>`;

    (p.comments||[]).forEach(c=>{
      html += `<p>${c.user}: ${c.text}</p>`;
    });

    html += `
      <input id="c${i}" placeholder="comment">
      <button onclick="addComment(${i})">Send</button>
    </div>`;

    div.innerHTML += html;
  });
}

// 自动登录
const saved = localStorage.getItem("user");
if(saved){
  currentUser = JSON.parse(saved);
  showMain();
}
</script>

</body>
</html>
