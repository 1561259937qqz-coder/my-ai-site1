<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR World - Full Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); height: 100vh; display: flex; flex-direction: column; }
    .page { display: none; height: 100vh; flex-direction: column; width: 100%; }
    .active { display: flex; }
    .center { justify-content: center; align-items: center; }
    
    /* 登录卡片 */
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 280px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #eee; box-sizing: border-box; outline: none; }
    button { padding: 10px 20px; border-radius: 10px; border: none; background: #ff6b81; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
    button:hover { background: #ff4757; }

    /* 内容区域 */
    .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
    
    /* 聊天气泡 */
    .msg { margin: 10px 0; padding: 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
    .user-msg { background: #4facfe; color: white; margin-left: auto; }
    .bot-msg { background: white; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* 动态卡片 */
    .post-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .post-user { color: #ff6b81; font-weight: bold; font-size: 14px; }
    .comment-item { font-size: 12px; background: #f8f8f8; padding: 5px 8px; margin-top: 5px; border-radius: 5px; border-left: 3px solid #ff6b81; }

    /* 底部导航和输入栏 */
    #nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: white; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
    .input-bar { position: fixed; bottom: 60px; width: 100%; display: flex; padding: 10px; background: white; border-top: 1px solid #eee; box-sizing: border-box; z-index: 99; }
    .input-bar input { flex: 1; margin: 0 10px 0 0; }
  </style>
</head>
<body>

<div id="loginPage" class="page active center">
  <div class="card">
    <h2 style="margin-bottom:20px;">VVR World</h2>
    <input id="username" placeholder="用户名">
    <input id="password" type="password" placeholder="密码">
    <button onclick="login()" style="width:100%">Enter</button>
  </div>
</div>

<div id="mainPage" class="page">
  
  <div id="chatSection" class="section active">
    <div class="content-area" id="chat-list">
      <div class="msg bot-msg">你好！我是 VVR 的 AI 助手，想聊点什么？</div>
    </div>
    <div class="input-bar">
      <input id="chatInput" placeholder="输入消息...">
      <button onclick="sendChat()">发送</button>
    </div>
  </div>

  <div id="postSection" class="section" style="display:none;">
    <div class="content-area" id="posts-list">正在获取动态...</div>
    <div class="input-bar">
      <input id="postInput" placeholder="分享新鲜事...">
      <button onclick="publishPost()">发布</button>
    </div>
  </div>

  <div id="nav">
    <button onclick="switchTab('chat')">聊天</button>
    <button onclick="switchTab('post')">社区</button>
    <button onclick="location.reload()">退出</button>
  </div>
</div>

<script>
/**
 * 配置信息
 */
const DB_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co"; 
const DB_KEY = "sb_publishable_lQYWTuCHC62vrRd-9DU3GQ_rRInvutu";

let vvrSupabase = null;

// 初始化 Supabase
try {
  if (window.supabase) {
    vvrSupabase = window.supabase.createClient(DB_URL, DB_KEY);
    console.log("Supabase 初始化成功");
  }
} catch (e) {
  console.error("SDK 加载失败");
}

const users = [
  { u: "xiaola", p: "060530" },
  { u: "vvr", p: "031210" }
];

let currentUser = null;

/**
 * 登录逻辑
 */
function login() {
  const u = document.getElementById("username").value.trim().toLowerCase();
  const p = document.getElementById("password").value.trim();
  const found = users.find(user => user.u === u && user.p === p);

  if (found) {
    currentUser = found;
    document.getElementById("loginPage").classList.remove("active");
    document.getElementById("mainPage").classList.add("active");
    loadAllPosts();
  } else {
    alert("用户名或密码错误");
  }
}

/**
 * 切换标签页
 */
function switchTab(tab) {
  const chat = document.getElementById("chatSection");
  const post = document.getElementById("postSection");
  if (tab === 'chat') {
    chat.style.display = "block";
    post.style.display = "none";
  } else {
    chat.style.display = "none";
    post.style.display = "block";
    loadAllPosts();
  }
}

/**
 * 聊天功能
 */
function sendChat() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;

  appendMsg(text, 'user-msg');
  input.value = "";

  // 简单模拟 AI 复读
  setTimeout(() => {
    appendMsg("VVR 收到消息：" + text, 'bot-msg');
  }, 800);
}

function appendMsg(text, cls) {
  const list = document.getElementById("chat-list");
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  list.appendChild(div);
  div.scrollIntoView();
}

/**
 * 社区功能 (Supabase)
 */
async function loadAllPosts() {
  if (!vvrSupabase) return;
  const area = document.getElementById("posts-list");
  
  const { data, error } = await vvrSupabase
    .from('posts')
    .select('*')
    .order('id', { ascending: false });

  if (error) {
    area.innerText = "数据加载失败，请检查数据库策略";
    return;
  }

  area.innerHTML = data.map((p, idx) => `
    <div class="post-card">
      <div class="post-user">@${p.user}</div>
      <div style="margin-top:10px;">${p.text}</div>
      <div id="comments-${p.id}">
        ${(p.comments || []).map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('')}
      </div>
      <div style="display:flex; margin-top:12px;">
        <input id="in-${p.id}" style="padding:5px; font-size:12px; margin:0;" placeholder="写评论...">
        <button onclick="addComment(${p.id})" style="padding:5px 10px; font-size:12px; margin-left:5px;">评论</button>
      </div>
    </div>
  `).join('') || "暂无动态";
}

async function publishPost() {
  const input = document.getElementById("postInput");
  const text = input.value.trim();
  if (!text) return;

  const { error } = await vvrSupabase
    .from('posts')
    .insert([{ user: currentUser.u, text: text, comments: [] }]);

  if (error) alert("发布失败");
  else {
    input.value = "";
    loadAllPosts();
  }
}

async function addComment(postId) {
  const input = document.getElementById(`in-${postId}`);
  const text = input.value.trim();
  if (!text) return;

  // 1. 获取当前最新评论
  const { data } = await vvrSupabase.from('posts').select('comments').eq('id', postId).single();
  const newList = [...(data.comments || []), { user: currentUser.u, text: text }];

  // 2. 更新
  const { error } = await vvrSupabase.from('posts').update({ comments: newList }).eq('id', postId);

  if (error) alert("评论失败");
  else {
    input.value = "";
    loadAllPosts();
  }
}

// 回车快捷键
document.onkeydown = (e) => {
  if (e.key === "Enter") {
    if (document.getElementById("loginPage").classList.contains("active")) login();
    else if (document.getElementById("chatSection").style.display !== "none") sendChat();
  }
};
</script>

</body>
</html>
