<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR Call Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    body { margin: 0; font-family: sans-serif; background: #1c1c1e; color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .status-circle { width: 150px; height: 150px; border-radius: 50%; background: #2c2c2e; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 30px; transition: 0.5s; border: 4px solid #3a3a3c; }
    .calling { border-color: #34c759; box-shadow: 0 0 20px #34c759; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    #info { font-size: 24px; margin-bottom: 10px; }
    #sub { font-size: 16px; color: #8e8e93; text-align: center; padding: 0 20px; min-height: 40px; }
    .btn-group { position: absolute; bottom: 80px; display: flex; gap: 30px; }
    .phone-btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; font-size: 30px; display: flex; align-items: center; justify-content: center; }
    .start { background: #34c759; color: white; }
    .stop { background: #ff3b30; color: white; display: none; }
  </style>
</head>
<body>

  <div id="circle" class="status-circle">V</div>
  <div id="info">VVR Call</div>
  <div id="sub">准备就绪，请点击接听</div>

  <div class="btn-group">
    <button id="startBtn" class="phone-btn start" onclick="initCall()">📞</button>
    <button id="stopBtn" class="phone-btn stop" onclick="location.reload()">❌</button>
  </div>

<script>
let recognition;
let isCallActive = false;
let chatHistory = [];
const synth = window.speechSynthesis;

// 1. 初始化语音识别
function setupRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("您的浏览器不支持语音通话，请使用 Chrome 或 Edge");
        return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; // 如果想说中文改为 'zh-CN'
    recognition.continuous = true;
    recognition.interimResults = false;

    // 当识别到声音时
    recognition.onresult = (event) => {
        const text = event.results[event.results.length - 1][0].transcript;
        console.log("识别到:", text);
        handleTalk(text);
    };

    // 自动重连逻辑：确保麦克风一直开着
    recognition.onend = () => {
        if (isCallActive) recognition.start();
    };

    recognition.onerror = (e) => {
        console.error("麦克风错误:", e.error);
        if (e.error === 'not-allowed') alert("请在浏览器设置中允许麦克风权限！");
    };
}

// 2. 接通电话
async function initCall() {
    setupRecognition();
    isCallActive = true;
    
    // UI 变换
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'flex';
    document.getElementById('circle').classList.add('calling');
    document.getElementById('sub').innerText = "正在连接 VVR...";

    // 启动麦克风
    try {
        await recognition.start();
        vvrSpeak("Hello, VVR is online. I'm listening.");
    } catch (e) {
        console.log("启动失败", e);
    }
}

// 3. 处理对话
async function handleTalk(text) {
    // 打断机制
    if (synth.speaking) synth.cancel();

    document.getElementById('sub').innerText = "你: " + text;

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, history: chatHistory })
        });
        const data = await res.json();
        if (data.reply) {
            chatHistory.push({ role: "user", content: text }, { role: "assistant", content: data.reply });
            vvrSpeak(data.reply);
        }
    } catch (e) {
        document.getElementById('sub').innerText = "连接超时";
    }
}

// 4. AI 发声
function vvrSpeak(text) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.onstart = () => {
        document.getElementById('sub').innerText = "VVR: " + text;
    };
    synth.speak(utter);
}
</script>
</body>
</html>
