<!DOCTYPE html>
<html>
<head>
  <title>VVR World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .page {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .active { display: flex; }

    .center {
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      background: #f1f1f1;
      font-size: 14px;
    }

    button {
      padding: 10px 18px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ff6b81, #ff9a9e);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.08);
    }

    #chat, #posts {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      padding: 10px 15px;
      border-radius: 15px;
      margin: 8px;
      max-width: 70%;
      animation: fade 0.2s;
    }

    .user {
      background: #4facfe;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: white;
    }

    @keyframes fade {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1;}
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
    }

    #inputArea input {
      flex: 1;
    }

    #nav {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 10px;
      box-shadow: 0 -5px 10px rgba(0,0,0,0.1);
    }

    .post {
      background: white;
      padding: 10px;
      margin: 10px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<!-- 登录 -->
<div id="loginPage" class="page active center">
  <div class="card">
    <h2>VVR Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- 主界面 -->
<div id="mainPage" class="page">

  <!-- 聊天 -->
  <div id="chatPage" class="page active">
    <div id="chat"></div>

    <div id="inputArea">
      <input id="chatInput" placeholder="Talk to VVR...">
      <button onclick="send()">Send</button>
    </div>
  </div>

  <!-- 留言板 -->
  <div id="postPage" class="page">
    <div id="posts"></div>

    <div id="inputArea">
      <input id="postInput" placeholder="Say something...">
      <button onclick="addPost()">Post</button>
    </div>
  </div>

  <!-- 底部导航 -->
  <div id="nav">
    <button onclick="show('chatPage')">Chat</button>
    <button onclick="show('postPage')">Community</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script>
const users = [
  { username: "xiaola", password: "060530" },
  { username: "user2", password: "031210" }
];

let currentUser = null;
let history = [];
let posts = JSON.parse(localStorage.getItem("posts") || "[]");

function login() {
  const name = username.value;
  const pass = password.value;

  const user = users.find(u => u.username === name && u.password === pass);
  if (!user) return alert("Wrong account");

  currentUser = user;
  localStorage.setItem("user", JSON.stringify(user));
  showMain();
}

function showMain() {
  loginPage.classList.remove("active");
  mainPage.classList.add("active");
  renderPosts();
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function show(page) {
  chatPage.classList.remove("active");
  postPage.classList.remove("active");
  document.getElementById(page).classList.add("active");
}

function createMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  div.scrollIntoView();
}

async function send() {
  const msg = chatInput.value;
  if (!msg) return;

  createMsg(msg, "user");
  chatInput.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg, history })
  });

  const data = await res.json();
  createMsg(data.reply, "bot");
}

// ⭐ 回车发送（重点）
chatInput.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    send();
  }
});

function addPost() {
  const text = postInput.value;
  if (!text) return;

  posts.push({
    user: currentUser.username,
    text,
    comments: []
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  postInput.value = "";
  renderPosts();
}

function renderPosts() {
  postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  posts.forEach(p=>{
    postsDiv.innerHTML += `
      <div class="post">
        <b>${p.user}</b><br>${p.text}
      </div>`;
  });
}

const saved = localStorage.getItem("user");
if (saved) {
  currentUser = JSON.parse(saved);
  showMain();
}
</script>

</body>
</html>
