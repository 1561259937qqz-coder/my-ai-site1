<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR World - Voice Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); height: 100vh; overflow: hidden; }
    .page { display: none; height: 100vh; flex-direction: column; width: 100%; }
    .active { display: flex; }
    .center { justify-content: center; align-items: center; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 280px; }
    input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 12px; border: none; background: #f1f1f1; font-size: 14px; outline: none; }
    button { padding: 10px 18px; border-radius: 12px; border: none; background: linear-gradient(135deg, #ff6b81, #ff9a9e); color: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
    
    .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
    .msg { padding: 10px 15px; border-radius: 15px; margin: 8px; max-width: 75%; word-wrap: break-word; font-size: 14px; line-height: 1.5; animation: fade 0.3s; }
    .user { background: #4facfe; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
    .bot { background: white; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom-left-radius: 2px; cursor: pointer; }
    
    /* 社区动态 */
    .post-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .comment-item { font-size: 12px; background: #f8f8f8; padding: 5px 8px; margin-top: 5px; border-radius: 5px; border-left: 3px solid #ff6b81; }

    /* 底部布局 */
    #nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: white; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
    .input-bar { position: fixed; bottom: 60px; width: 100%; display: flex; padding: 10px; background: white; border-top: 1px solid #eee; box-sizing: border-box; z-index: 99; align-items: center; }
    .input-bar input { flex: 1; margin: 0 10px; }
    
    /* 语音按钮样式 */
    .voice-btn { background: #eee; color: #333; padding: 10px; border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; }
    .recording { background: #ff4757; color: white; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  </style>
</head>

<body>

<div id="loginPage" class="page active center">
  <div class="card">
    <h2 style="color: #ff6b81;">VVR World</h2>
    <input id="u_name" placeholder="Username">
    <input id="u_pass" type="password" placeholder="Password">
    <button onclick="login()" style="width:100%">Enter</button>
  </div>
</div>

<div id="mainPage" class="page">
  <div id="chatTab" class="section" style="display:flex; flex-direction:column; height:100%;">
    <div id="chat-box" class="content-area">
        <div class="msg bot" onclick="speak(this.innerText)">Hello! I am VVR. Click me to hear my voice!</div>
    </div>
    <div class="input-bar">
      <button id="micBtn" class="voice-btn" onclick="toggleListen()">🎤</button>
      <input id="chatInput" placeholder="Talk to VVR...">
      <button id="sendBtn" onclick="sendMsg()">Send</button>
    </div>
  </div>

  <div id="postTab" class="section" style="display:none; flex-direction:column; height:100%;">
    <div id="posts-box" class="content-area">正在加载动态...</div>
    <div class="input-bar">
      <input id="postInput" placeholder="Say something...">
      <button onclick="publish()">Post</button>
    </div>
  </div>

  <div id="nav">
    <button onclick="switchPage('chat')">Chat</button>
    <button onclick="switchPage('post')">Community</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>
const SB_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co";
const SB_KEY = "sb_publishable_lQYWTuCHC62vrRd-9DU3GQ_rRInvutu";

let vvrSB = null;
try { if (window.supabase) vvrSB = window.supabase.createClient(SB_URL, SB_KEY); } catch (e) {}

const userList = [ { u: "vvr", p: "031210" }, { u: "xiaola", p: "060530" }, { u: "user1", p: "123" } ];
let currentUser = null;
let chatHistory = [];

// --- 语音核心逻辑 ---

// 1. 语音识别 (Speech Recognition)
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; // 设为英文，你也可以改为 'zh-CN'
    recognition.continuous = false;

    recognition.onresult = (event) => {
        const result = event.results[0][0].transcript;
        document.getElementById("chatInput").value = result;
        toggleListen(); // 识别后停止
    };

    recognition.onerror = () => toggleListen();
}

function toggleListen() {
    if (!recognition) return alert("Your browser doesn't support speech recognition.");
    const btn = document.getElementById("micBtn");
    if (!isListening) {
        recognition.start();
        btn.classList.add("recording");
        isListening = true;
    } else {
        recognition.stop();
        btn.classList.remove("recording");
        isListening = false;
    }
}

// 2. 语音播报 (Text to Speech)
function speak(text) {
    const msg = new SpeechSynthesisUtterance();
    msg.text = text;
    msg.lang = 'en-US'; // VVR 默认说英文
    msg.rate = 1.0;     // 语速
    window.speechSynthesis.speak(msg);
}

// --- 基础逻辑 ---
function login() {
  const name = document.getElementById("u_name").value.trim().toLowerCase();
  const pass = document.getElementById("u_pass").value.trim();
  const found = userList.find(x => x.u === name && x.p === pass);
  if (found) { currentUser = found; localStorage.setItem("vvr_user", JSON.stringify(found)); enter(); }
  else { alert("Login Failed"); }
}

function enter() {
  document.getElementById("loginPage").classList.remove("active");
  document.getElementById("mainPage").classList.add("active");
  renderPosts();
}

function logout() { localStorage.removeItem("vvr_user"); location.reload(); }

function switchPage(p) {
  const c = document.getElementById("chatTab");
  const t = document.getElementById("postTab");
  if(p === 'chat') { c.style.display="flex"; t.style.display="none"; }
  else { c.style.display="none"; t.style.display="flex"; renderPosts(); }
}

// --- 聊天对接 ---
function append(text, cls, id) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div");
  div.className = "msg " + cls;
  if(id) div.id = id;
  div.innerText = text;
  // 给机器人消息添加点击朗诵功能
  if(cls === 'bot') div.onclick = () => speak(text);
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById("chatInput");
  const btn = document.getElementById("sendBtn");
  const msg = input.value.trim();
  if (!msg || btn.disabled) return;

  append(msg, "user");
  input.value = "";
  btn.disabled = true;

  const loadingId = "L-" + Date.now();
  append("VVR is thinking...", "bot", loadingId);

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, history: chatHistory })
    });

    const data = await res.json();
    document.getElementById(loadingId).remove();

    if (data.reply) {
      append(data.reply, "bot");
      speak(data.reply); // AI 自动开口说话
      chatHistory.push({ role: "user", content: msg }, { role: "assistant", content: data.reply });
      if(chatHistory.length > 10) chatHistory.shift();
    }
  } catch (e) {
    document.getElementById(loadingId).innerText = "Connection Error.";
  } finally { btn.disabled = false; }
}

// --- 社区逻辑 ---
async function renderPosts() {
  const box = document.getElementById("posts-box");
  if(!vvrSB) return;
  const { data } = await vvrSB.from('posts').select('*').order('id', { ascending: false });
  if(!data) return;
  box.innerHTML = data.map(p => `
    <div class="post-card">
      <b style="color:#ff6b81">@${p.user}</b>
      <p style="margin:8px 0;">${p.text}</p>
      <div>${(p.comments || []).map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('')}</div>
      <div style="display:flex; margin-top:10px;">
        <input id="in-${p.id}" style="padding:5px; font-size:12px; margin:0;" placeholder="Comment...">
        <button onclick="addComm(${p.id})" style="padding:5px 10px; font-size:12px; margin-left:5px;">Send</button>
      </div>
    </div>
  `).join('') || "No posts yet.";
}

async function publish() {
  const val = document.getElementById("postInput").value.trim();
  if(!val) return;
  await vvrSB.from('posts').insert([{ user: currentUser.u, text: val, comments: [] }]);
  document.getElementById("postInput").value = "";
  renderPosts();
}

async function addComm(id) {
  const input = document.getElementById(`in-${id}`);
  if(!input.value.trim()) return;
  const { data } = await vvrSB.from('posts').select('comments').eq('id', id).single();
  const newList = [...(data.comments || []), { user: currentUser.u, text: input.value }];
  await vvrSB.from('posts').update({ comments: newList }).eq('id', id);
  input.value = ""; renderPosts();
}

document.onkeydown = (e) => {
    if(e.key === "Enter") {
        if(document.getElementById("loginPage").classList.contains("active")) login();
        else if(document.getElementById("chatTab").style.display !== "none") sendMsg();
    }
}

const saved = localStorage.getItem("vvr_user");
if (saved) { currentUser = JSON.parse(saved); enter(); }
</script>
</body>
</html>
