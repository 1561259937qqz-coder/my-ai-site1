<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VVR World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); height: 100vh; display: flex; flex-direction: column; }
    .page { display: none; height: 100vh; flex-direction: column; width: 100%; }
    .active { display: flex; }
    .center { justify-content: center; align-items: center; }
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 280px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #eee; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #ff6b81; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }
    #nav { display: flex; justify-content: space-around; background: white; padding: 10px; border-top: 1px solid #eee; }
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    .post-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

<div id="loginPage" class="page active center">
  <div class="card">
    <h2 style="margin-bottom:20px;">Login</h2>
    <input id="login_user" placeholder="用户名 (vvr / xiaola)">
    <input id="login_pass" type="password" placeholder="密码">
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="mainPage" class="page">
  <div class="content">
    <h3 id="welcome_msg">欢迎回来</h3>
    <p id="db_info" style="font-size: 12px; color: #666;">正在连接数据库...</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    <div id="posts_area"></div>
  </div>
  <div id="nav">
    <button onclick="alert('聊天功能开发中')">聊天</button>
    <button onclick="location.reload()">退出</button>
  </div>
</div>

<script>
/**
 * 核心配置：使用你提供的最新 URL 和 Key
 */
const S_URL = "https://jdoqoivnzjdfmuedtmwn.supabase.co"; //
const S_KEY = "sb_publishable_lQYWTuCHC62vrRd-9DU3GQ_rRInvutu"; //

// 全局客户端变量，只声明一次，避免 "already been declared" 错误
let vvrSupabase = null;

try {
  if (window.supabase) {
    vvrSupabase = window.supabase.createClient(S_URL, S_KEY);
    console.log("Supabase 初始化成功");
  }
} catch (e) {
  console.error("初始化失败:", e);
}

const users = [
  { u: "xiaola", p: "060530" },
  { u: "vvr", p: "031210" }
];

/**
 * 登录函数：对应 HTML 按钮的 onclick="login()"
 */
function login() {
  const uInput = document.getElementById("login_user").value.trim().toLowerCase();
  const pInput = document.getElementById("login_pass").value.trim();

  const found = users.find(user => user.u === uInput && user.p === pInput);

  if (found) {
    console.log("登录验证通过");
    // 切换界面
    document.getElementById("loginPage").classList.remove("active");
    document.getElementById("mainPage").classList.add("active");
    document.getElementById("welcome_msg").innerText = "欢迎回来, " + uInput;

    // 尝试从数据库读取数据
    if (vvrSupabase) {
      loadPosts();
    } else {
      document.getElementById("db_info").innerText = "插件未加载，无法读取数据";
    }
  } else {
    alert("用户名或密码不正确");
  }
}

/**
 * 读取帖子数据
 */
async function loadPosts() {
  const area = document.getElementById("posts_area");
  try {
    const { data, error } = await vvrSupabase.from('posts').select('*');
    
    if (error) throw error;

    document.getElementById("db_info").innerText = "数据库已连接 ✅";
    
    if (data && data.length > 0) {
      area.innerHTML = data.map(item => `
        <div class="post-item">
          <b style="color:#ff6b81">@${item.user}</b>
          <p style="margin:8px 0 0 0;">${item.text}</p>
        </div>
      `).join('');
    } else {
      area.innerHTML = "<p style='color:#999'>目前还没有动态哦</p>";
    }
  } catch (err) {
    console.error("读取失败:", err);
    document.getElementById("db_info").innerText = "连接成功但无法读取数据，请检查 RLS 策略";
  }
}

// 自动登录检查
window.onload = () => {
  console.log("页面加载完成");
};
</script>

</body>
</html>
